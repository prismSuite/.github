<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 220" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .blink{animation:blink 1.2s step-end infinite}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      .ticker{animation:tick 22s linear infinite}
      @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
      .pulse{animation:pulse 3s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
      .fadein{animation:fi 0.5s ease forwards;opacity:0}
      .d1{animation-delay:0.05s}.d2{animation-delay:0.15s}.d3{animation-delay:0.28s}.d4{animation-delay:0.42s}
      @keyframes fi{to{opacity:1}}
    </style>
  </defs>

